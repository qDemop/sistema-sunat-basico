openapi: 3.0.3
info: { title: Reports API, version: 2.0.0 }
security: [{ bearerAuth: [] }]
paths:
  /api/reportes/dashboard:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: getDashboardKpis
      x-roles: &reportRoles [Gerente Financiero, Administrador Sistema]
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/PeriodoQuery' }]
      responses:
        '200': { description: Canonical posted-ledger/finalized-payroll KPIs, content: { application/json: { schema: { $ref: '#/components/schemas/DashboardKpis' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/reportes/balance-general:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: getBalanceSheet
      x-roles: *reportRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/PeriodoQuery' }]
      responses:
        '200': { description: Cumulative balance sheet through period end, content: { application/json: { schema: { $ref: '#/components/schemas/FinancialReportResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/reportes/estado-resultados:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: getIncomeStatement
      x-roles: *reportRoles
      parameters:
        - { name: periodoDesde, in: query, required: true, schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' } }
        - { name: periodoHasta, in: query, required: true, schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' } }
      responses:
        '200': { description: Posted-ledger income statement for range, content: { application/json: { schema: { $ref: '#/components/schemas/FinancialReportResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/reportes/planilla-consolidada:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: getConsolidatedPayroll
      x-roles: *reportRoles
      parameters:
        - { $ref: '../shared-api-components.yaml#/components/parameters/PeriodoQuery' }
        - { name: departamentoId, in: query, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Finalized payroll consolidation, content: { application/json: { schema: { $ref: '#/components/schemas/PayrollReportResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/reportes/{tipo}/exportaciones:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    post:
      operationId: createReportExport
      x-roles: *reportRoles
      parameters:
        - name: tipo
          in: path
          required: true
          schema: { type: string, enum: [balance-general, estado-resultados, planilla-consolidada] }
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ReportExportRequest' } } } }
      responses:
        '201': { description: Immutable report snapshot and file generated, content: { application/json: { schema: { $ref: '#/components/schemas/ReportExportResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/reportes/exportaciones:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: listReportExports
      x-roles: *reportRoles
      parameters:
        - { $ref: '../shared-api-components.yaml#/components/parameters/Page' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/PageSize' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortBy' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortDirection' }
        - { name: tipo, in: query, schema: { type: string } }
        - { name: periodo, in: query, schema: { type: string } }
      responses:
        '200': { description: Export snapshot page, content: { application/json: { schema: { $ref: '#/components/schemas/ReportExportPage' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/reportes/exportaciones/{id}/archivo:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: downloadReportExport
      x-roles: *reportRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Snapshot file, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    DashboardKpis:
      type: object
      required: [periodo, netoPlanilla, costoPlanilla, ingresosTotales, costosGastos, utilidadNeta, margenUtilidad, igvPorPagar, cuentasPorCobrar, cuentasPorPagar, sourceCutoff]
      properties:
        periodo: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        netoPlanilla: { type: number, multipleOf: 0.01 }
        costoPlanilla: { type: number, multipleOf: 0.01, description: Cash gross plus CTS/gratification provisions. }
        ingresosTotales: { type: number, multipleOf: 0.01 }
        costosGastos: { type: number, multipleOf: 0.01 }
        utilidadNeta: { type: number, multipleOf: 0.01 }
        margenUtilidad: { type: number, multipleOf: 0.01 }
        igvPorPagar: { type: number, multipleOf: 0.01, description: Negative means tax credit. }
        cuentasPorCobrar: { type: number, multipleOf: 0.01, description: Posted balance of account 1212. }
        cuentasPorPagar: { type: number, multipleOf: 0.01, description: Posted balance of account 4212. }
        sourceCutoff: { type: string, format: date-time }
    ReportLine:
      type: object
      required: [codigo, etiqueta, monto]
      properties: { codigo: { type: string }, etiqueta: { type: string }, monto: { type: number, multipleOf: 0.01 } }
    FinancialReportResponse:
      type: object
      required: [tipo, periodoDesde, periodoHasta, lineas, totales, sourceCutoff]
      properties:
        tipo: { type: string, enum: [BalanceGeneral, EstadoResultados] }
        periodoDesde: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        periodoHasta: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        lineas: { type: array, items: { $ref: '#/components/schemas/ReportLine' } }
        totales: { type: object, additionalProperties: { type: number } }
        sourceCutoff: { type: string, format: date-time }
    PayrollReportResponse:
      type: object
      required: [periodo, estado, lineas, totalBruto, totalDescuentos, totalNeto, totalProvisionGratificacion, totalProvisionCts]
      properties:
        periodo: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        estado: { type: string, enum: [Finalized] }
        departamentoId: { type: integer, format: int64, nullable: true }
        lineas: { type: array, items: { $ref: '#/components/schemas/PayrollReportLine' } }
        totalBruto: { type: number, multipleOf: 0.01 }
        totalDescuentos: { type: number, multipleOf: 0.01 }
        totalNeto: { type: number, multipleOf: 0.01 }
        totalProvisionGratificacion: { type: number, multipleOf: 0.01 }
        totalProvisionCts: { type: number, multipleOf: 0.01 }
    PayrollReportLine:
      type: object
      required: [departamentoId, departamento, empleados, totalBruto, totalDescuentos, totalNeto, totalProvisionGratificacion, totalProvisionCts]
      properties:
        departamentoId: { type: integer, format: int64 }
        departamento: { type: string }
        empleados: { type: integer, minimum: 0 }
        totalBruto: { type: number, multipleOf: 0.01 }
        totalDescuentos: { type: number, multipleOf: 0.01 }
        totalNeto: { type: number, multipleOf: 0.01 }
        totalProvisionGratificacion: { type: number, multipleOf: 0.01 }
        totalProvisionCts: { type: number, multipleOf: 0.01 }
    ReportExportRequest:
      type: object
      required: [formato, periodoDesde, periodoHasta]
      properties:
        formato: { type: string, enum: [PDF, Excel] }
        periodoDesde: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        periodoHasta: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        departamentoId: { type: integer, format: int64, nullable: true }
    ReportExportResponse:
      type: object
      required: [id, tipo, formato, periodoDesde, periodoHasta, generadoPor, filtros, estado, archivoDisponible, fechaGeneracion, sourceCutoff, correlationId]
      properties:
        id: { type: integer, format: int64 }
        tipo: { type: string, enum: [BalanceGeneral, EstadoResultados, PlanillaConsolidada] }
        formato: { type: string, enum: [PDF, Excel] }
        periodoDesde: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        periodoHasta: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        departamentoId: { type: integer, format: int64, nullable: true }
        generadoPor: { type: string }
        filtros: { type: object, additionalProperties: true }
        estado: { type: string, enum: [Generated, Failed] }
        archivoDisponible: { type: boolean }
        fechaGeneracion: { type: string, format: date-time }
        sourceCutoff: { type: string, format: date-time }
        correlationId: { type: string }
    ReportExportPage:
      type: object
      required: [items, pageInfo]
      properties: { items: { type: array, items: { $ref: '#/components/schemas/ReportExportResponse' } }, pageInfo: { $ref: '../shared-api-components.yaml#/components/schemas/PageInfo' } }
