openapi: 3.0.3
info:
  title: ERP Shared API Components
  version: 1.0.0
paths: {}
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    PeriodoPath:
      name: periodo
      in: path
      required: true
      schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
    PeriodoQuery:
      name: periodo
      in: query
      required: true
      schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    SortBy:
      name: sortBy
      in: query
      schema: { type: string }
    SortDirection:
      name: sortDirection
      in: query
      schema: { type: string, enum: [asc, desc], default: asc }
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema: { type: string, minLength: 8, maxLength: 64 }
  schemas:
    ErrorResponse:
      type: object
      required: [status, code, message, correlationId]
      properties:
        status: { type: integer }
        code: { type: string }
        message: { type: string }
        correlationId: { type: string }
        validationErrors:
          type: array
          items:
            type: object
            required: [field, code, message]
            properties:
              field: { type: string }
              code: { type: string }
              message: { type: string }
    PageInfo:
      type: object
      required: [page, pageSize, totalItems, totalPages]
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        totalItems: { type: integer, format: int64 }
        totalPages: { type: integer }
    CommandResult:
      type: object
      required: [id, state, correlationId]
      properties:
        id: { type: integer, format: int64 }
        state: { type: string }
        correlationId: { type: string }
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing, expired, invalid, or revoked JWT.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Authenticated role is not allowed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Lifecycle, duplicate, concurrency, or effective-version conflict.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
