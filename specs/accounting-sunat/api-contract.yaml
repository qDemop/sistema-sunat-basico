openapi: 3.0.3
info: { title: Accounting SUNAT API, version: 2.0.0 }
security: [{ bearerAuth: [] }]
paths:
  /api/comprobantes:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: listComprobantes
      x-roles: &accountingRoles [Contador, Administrador Sistema]
      parameters:
        - { $ref: '../shared-api-components.yaml#/components/parameters/Page' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/PageSize' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortBy' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortDirection' }
        - { name: tipoMovimiento, in: query, schema: { type: string, enum: [Compra, Venta] } }
        - { name: estado, in: query, schema: { type: string, enum: [Registrado, Anulado] } }
        - { name: desde, in: query, schema: { type: string, format: date } }
        - { name: hasta, in: query, schema: { type: string, format: date } }
        - { name: search, in: query, schema: { type: string } }
      responses:
        '200': { description: Voucher page, content: { application/json: { schema: { $ref: '#/components/schemas/ComprobantePage' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    post:
      operationId: createComprobante
      x-roles: *accountingRoles
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ComprobanteRequest' } } } }
      responses:
        '201': { description: Voucher and source Draft created, content: { application/json: { schema: { $ref: '#/components/schemas/ComprobanteResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/comprobantes/dashboard:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: getAccountingOperationalDashboard
      x-roles: *accountingRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/PeriodoQuery' }]
      responses:
        '200': { description: Operational accounting and SUNAT dashboard, content: { application/json: { schema: { $ref: '#/components/schemas/AccountingDashboardResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/comprobantes/{id}:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: getComprobante
      x-roles: *accountingRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Voucher detail, content: { application/json: { schema: { $ref: '#/components/schemas/ComprobanteResponse' } } } }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    put:
      operationId: updateComprobante
      x-roles: *accountingRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ComprobanteRequest' } } } }
      responses:
        '200': { description: Voucher and source Draft updated, content: { application/json: { schema: { $ref: '#/components/schemas/ComprobanteResponse' } } } }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    delete:
      operationId: annulComprobante
      x-roles: *accountingRoles
      parameters:
        - { $ref: '../shared-api-components.yaml#/components/parameters/Id' }
        - { name: periodoReversion, in: query, required: false, schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' } }
      responses:
        '200': { description: Voucher annulled and source Draft cancelled/reversed, content: { application/json: { schema: { $ref: '../shared-api-components.yaml#/components/schemas/CommandResult' } } } }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/libros/validacion:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: validateSunatBook
      x-roles: *accountingRoles
      parameters:
        - { $ref: '../shared-api-components.yaml#/components/parameters/PeriodoQuery' }
        - { name: tipoLibro, in: query, required: true, schema: { type: string, enum: [Compras, Ventas] } }
      responses:
        '200': { description: Non-mutating validation result, content: { application/json: { schema: { $ref: '#/components/schemas/LibroValidationResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/libros:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    post:
      operationId: generateSunatBook
      x-roles: *accountingRoles
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/LibroGenerationRequest' } } } }
      responses:
        '201': { description: Next immutable version generated, content: { application/json: { schema: { $ref: '#/components/schemas/LibroContableResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    get:
      operationId: listSunatBooks
      x-roles: *accountingRoles
      parameters:
        - { $ref: '../shared-api-components.yaml#/components/parameters/Page' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/PageSize' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortBy' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortDirection' }
        - { name: periodo, in: query, schema: { type: string } }
        - { name: tipoLibro, in: query, schema: { type: string, enum: [Compras, Ventas] } }
      responses:
        '200': { description: Book version page, content: { application/json: { schema: { $ref: '#/components/schemas/LibroPage' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/libros/{id}:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: getSunatBook
      x-roles: *accountingRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Book and immutable snapshot rows, content: { application/json: { schema: { $ref: '#/components/schemas/LibroContableResponse' } } } }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/libros/{id}/export/pdf:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: exportSunatBookPdf
      x-roles: *accountingRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Book PDF, content: { application/pdf: { schema: { type: string, format: binary } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
  /api/libros/{id}/export/excel:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: exportSunatBookExcel
      x-roles: *accountingRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Book workbook using stored format version, content: { application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: { schema: { type: string, format: binary } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    ComprobanteRequest:
      type: object
      required: [tipoMovimiento, tipoComprobanteId, serie, numero, fechaEmision, tipoDocumento, numeroDocumento, razonSocial, baseImponible, baseExonerada, tipoOperacion]
      description: |
        Base validation rules enforced by the application layer (FluentValidation):
        - tipoOperacion=Gravada: baseImponible must be > 0 (taxable base).
        - tipoOperacion=Exonerada: baseExonerada must be > 0 (exempt base).
        - tipoOperacion=Inafecta: both baseImponible and baseExonerada must be 0 (unaffected operation; the operation value is recorded on the voucher total without IGV).
        At least one base must be positive for Gravada/Exonerada so the voucher can produce the required source journal entry. The previous anyOf constraint was removed because it conflicted with Inafecta operations where both bases are legitimately zero.
      properties:
        tipoMovimiento: { type: string, enum: [Compra, Venta] }
        tipoComprobanteId: { type: integer, format: int64 }
        comprobanteReferenciaId: { type: integer, format: int64, nullable: true, description: Required for SUNAT codes 07 and 08; prohibited otherwise. }
        serie: { type: string, minLength: 1, maxLength: 10 }
        numero: { type: string, minLength: 1, maxLength: 20 }
        fechaEmision: { type: string, format: date }
        tipoDocumento: { type: string, enum: [RUC, DNI, Otro] }
        numeroDocumento: { type: string, minLength: 1, maxLength: 20 }
        razonSocial: { type: string, minLength: 1, maxLength: 200 }
        baseImponible: { type: number, multipleOf: 0.01, minimum: 0, maximum: 99999999.99 }
        baseExonerada: { type: number, multipleOf: 0.01, minimum: 0, maximum: 99999999.99 }
        tipoOperacion: { type: string, enum: [Gravada, Exonerada, Inafecta] }
    ComprobanteResponse:
      allOf:
        - { $ref: '#/components/schemas/ComprobanteRequest' }
        - type: object
          required: [id, tipoComprobante, codigoSunat, configTributariaVersionId, tasaIgv, igv, total, estado, bloqueadoPorLibro, asientoDraftId, fechaCreacion]
          properties:
            id: { type: integer, format: int64 }
            tipoComprobante: { type: string }
            codigoSunat: { type: string }
            configTributariaVersionId: { type: integer, format: int64 }
            tasaIgv: { type: number, multipleOf: 0.01 }
            igv: { type: number, multipleOf: 0.01 }
            total: { type: number, multipleOf: 0.01 }
            estado: { type: string, enum: [Registrado, Anulado] }
            bloqueadoPorLibro: { type: boolean }
            asientoDraftId: { type: integer, format: int64, nullable: true }
            fechaCreacion: { type: string, format: date-time }
    ComprobantePage:
      type: object
      required: [items, pageInfo]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ComprobanteResponse' } }
        pageInfo: { $ref: '../shared-api-components.yaml#/components/schemas/PageInfo' }
    LibroValidationResponse:
      type: object
      required: [periodo, tipoLibro, estado, elegibles, observaciones, formatVersion, filas]
      properties:
        periodo: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        tipoLibro: { type: string, enum: [Compras, Ventas] }
        estado: { type: string, enum: [Valida, ConObservaciones, Bloqueada] }
        elegibles: { type: integer, format: int64 }
        observaciones: { type: array, items: { type: string } }
        formatVersion: { type: string, nullable: true }
        filas: { type: array, items: { $ref: '#/components/schemas/LibroPreviewRow' } }
    LibroGenerationRequest:
      type: object
      required: [periodo, tipoLibro, aceptarObservaciones]
      properties:
        periodo: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        tipoLibro: { type: string, enum: [Compras, Ventas] }
        aceptarObservaciones: { type: boolean }
    LibroRow:
      type: object
      required: [orden, comprobanteId, configTributariaVersionId, periodo, tipoDocumento, numeroDocumento, codigoTipoComprobante, serie, numero, fechaEmision, baseImponible, baseExonerada, igv, total]
      properties:
        orden: { type: integer }
        comprobanteId: { type: integer, format: int64 }
        configTributariaVersionId: { type: integer, format: int64 }
        periodo: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        tipoDocumento: { type: string }
        numeroDocumento: { type: string }
        codigoTipoComprobante: { type: string }
        serie: { type: string }
        numero: { type: string }
        fechaEmision: { type: string, format: date }
        baseImponible: { type: number, multipleOf: 0.01 }
        baseExonerada: { type: number, multipleOf: 0.01 }
        igv: { type: number, multipleOf: 0.01 }
        total: { type: number, multipleOf: 0.01 }
    LibroPreviewRow:
      allOf:
        - { $ref: '#/components/schemas/LibroRow' }
        - type: object
          required: [validacion]
          properties:
            validacion: { type: string, enum: [Valida, ConObservaciones] }
    AccountingDashboardResponse:
      type: object
      required: [periodo, comprobantesRegistrados, igvVentas, igvCompras, igvNetoOperativo, periodoContableEstado, libroComprasVersion, libroVentasVersion, correlationId]
      properties:
        periodo: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        comprobantesRegistrados: { type: integer, minimum: 0 }
        igvVentas: { type: number, multipleOf: 0.01, description: IGV from Registrado Venta vouchers in the period. }
        igvCompras: { type: number, multipleOf: 0.01, description: IGV from Registrado Compra vouchers in the period. }
        igvNetoOperativo: { type: number, multipleOf: 0.01, description: igvVentas minus igvCompras; operational, not Posted-ledger reporting. }
        periodoContableEstado: { type: string, enum: [SinPeriodo, Open, Closed] }
        libroComprasVersion: { type: integer, nullable: true }
        libroVentasVersion: { type: integer, nullable: true }
        correlationId: { type: string }
    LibroContableResponse:
      type: object
      required: [id, periodo, tipoLibro, version, formatVersion, generadoPor, fechaGeneracion, estado, filas, totalBaseImponible, totalIgv, totalGeneral]
      properties:
        id: { type: integer, format: int64 }
        periodo: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        tipoLibro: { type: string, enum: [Compras, Ventas] }
        version: { type: integer }
        formatVersion: { type: string }
        generadoPor: { type: string }
        fechaGeneracion: { type: string, format: date-time }
        estado: { type: string, enum: [Generado] }
        filas: { type: array, items: { $ref: '#/components/schemas/LibroRow' } }
        totalBaseImponible: { type: number, multipleOf: 0.01, description: Sum of taxable base only; exempt base remains available in each immutable row. }
        totalIgv: { type: number, multipleOf: 0.01 }
        totalGeneral: { type: number, multipleOf: 0.01 }
    LibroPage:
      type: object
      required: [items, pageInfo]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/LibroContableResponse' } }
        pageInfo: { $ref: '../shared-api-components.yaml#/components/schemas/PageInfo' }
