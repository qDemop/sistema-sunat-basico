openapi: 3.0.3
info: { title: General Ledger API, version: 2.0.0 }
security: [{ bearerAuth: [] }]
paths:
  /api/contabilidad/periodos:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: listAccountingPeriods
      x-roles: &readRoles [Contador, Gerente Financiero, Administrador Sistema]
      parameters: &paging
        - { $ref: '../shared-api-components.yaml#/components/parameters/Page' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/PageSize' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortBy' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortDirection' }
      responses:
        '200': { description: Period page, content: { application/json: { schema: { $ref: '#/components/schemas/PeriodoPage' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    post:
      operationId: createAccountingPeriod
      x-roles: &writeRoles [Contador, Administrador Sistema]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PeriodoRequest' } } } }
      responses:
        '201': { description: Open period created, content: { application/json: { schema: { $ref: '#/components/schemas/PeriodoResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/contabilidad/periodos/{id}/cerrar:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    post:
      operationId: closeAccountingPeriod
      x-roles: *writeRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Period closed, content: { application/json: { schema: { $ref: '#/components/schemas/PeriodoResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
  /api/contabilidad/cuentas:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: listAccounts
      x-roles: *readRoles
      parameters:
        - { $ref: '../shared-api-components.yaml#/components/parameters/Page' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/PageSize' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortBy' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortDirection' }
        - { name: tipo, in: query, schema: { type: string } }
        - { name: activo, in: query, schema: { type: boolean } }
      responses:
        '200': { description: Account page, content: { application/json: { schema: { $ref: '#/components/schemas/CuentaPage' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    post:
      operationId: createAccount
      x-roles: *writeRoles
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CuentaRequest' } } } }
      responses:
        '201': { description: Account created, content: { application/json: { schema: { $ref: '#/components/schemas/CuentaResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/contabilidad/cuentas/{id}:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: getAccount
      x-roles: *readRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Account detail and posted balance, content: { application/json: { schema: { $ref: '#/components/schemas/CuentaResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    put:
      operationId: updateAccount
      x-roles: *writeRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CuentaRequest' } } } }
      responses:
        '200': { description: Account updated, content: { application/json: { schema: { $ref: '#/components/schemas/CuentaResponse' } } } }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    delete:
      operationId: deactivateAccount
      x-roles: *writeRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Account deactivated, content: { application/json: { schema: { $ref: '../shared-api-components.yaml#/components/schemas/CommandResult' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
  /api/contabilidad/cuentas/{id}/reactivar:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    put:
      operationId: reactivateAccount
      x-roles: *writeRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Account reactivated, content: { application/json: { schema: { $ref: '../shared-api-components.yaml#/components/schemas/CommandResult' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
  /api/contabilidad/asientos:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: listJournalEntries
      x-roles: *readRoles
      parameters:
        - { $ref: '../shared-api-components.yaml#/components/parameters/Page' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/PageSize' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortBy' }
        - { $ref: '../shared-api-components.yaml#/components/parameters/SortDirection' }
        - { name: periodo, in: query, schema: { type: string } }
        - { name: estado, in: query, schema: { type: string, enum: [Draft, Posted, Cancelled] } }
        - { name: origen, in: query, schema: { type: string, enum: [Manual, Comprobante, Planilla, Ajuste] } }
      responses:
        '200': { description: Journal entry page, content: { application/json: { schema: { $ref: '#/components/schemas/AsientoPage' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    post:
      operationId: createJournalEntry
      x-roles: *writeRoles
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AsientoRequest' } } } }
      responses:
        '201': { description: Draft entry created, content: { application/json: { schema: { $ref: '#/components/schemas/AsientoResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/contabilidad/asientos/{id}:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    get:
      operationId: getJournalEntry
      x-roles: *readRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Journal-entry detail, content: { application/json: { schema: { $ref: '#/components/schemas/AsientoResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
    put:
      operationId: updateJournalEntry
      x-roles: *writeRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AsientoRequest' } } } }
      responses:
        '200': { description: Draft entry updated, content: { application/json: { schema: { $ref: '#/components/schemas/AsientoResponse' } } } }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
  /api/contabilidad/asientos/{id}/postear:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    post:
      operationId: postJournalEntry
      x-roles: *writeRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Entry posted, content: { application/json: { schema: { $ref: '#/components/schemas/AsientoResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
  /api/contabilidad/asientos/{id}/cancelar:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    post:
      operationId: cancelJournalEntry
      x-roles: *writeRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      responses:
        '200': { description: Draft entry cancelled, content: { application/json: { schema: { $ref: '#/components/schemas/AsientoResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
  /api/contabilidad/asientos/{id}/revertir:
    parameters:
      - { $ref: '../shared-api-components.yaml#/components/parameters/CorrelationId' }
    post:
      operationId: reverseJournalEntry
      x-roles: *writeRoles
      parameters: [{ $ref: '../shared-api-components.yaml#/components/parameters/Id' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ReversalRequest' } } } }
      responses:
        '201': { description: Linked reversal Draft created, content: { application/json: { schema: { $ref: '#/components/schemas/AsientoResponse' } } } }
        '400': { $ref: '../shared-api-components.yaml#/components/responses/BadRequest' }
        '401': { $ref: '../shared-api-components.yaml#/components/responses/Unauthorized' }
        '403': { $ref: '../shared-api-components.yaml#/components/responses/Forbidden' }
        '409': { $ref: '../shared-api-components.yaml#/components/responses/Conflict' }
        '404': { $ref: '../shared-api-components.yaml#/components/responses/NotFound' }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    PeriodoRequest:
      type: object
      required: [codigo, fechaInicio, fechaFin]
      properties:
        codigo: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        fechaInicio: { type: string, format: date }
        fechaFin: { type: string, format: date }
    PeriodoResponse:
      allOf:
        - { $ref: '#/components/schemas/PeriodoRequest' }
        - { type: object, required: [id, estado, fechaCierre, cerradoPorId, asientosDraft, asientosPosted], properties: { id: { type: integer, format: int64 }, estado: { type: string, enum: [Open, Closed] }, fechaCierre: { type: string, format: date-time, nullable: true }, cerradoPorId: { type: integer, format: int64, nullable: true }, asientosDraft: { type: integer, minimum: 0 }, asientosPosted: { type: integer, minimum: 0 } } }
    PeriodoPage:
      type: object
      required: [items, pageInfo]
      properties: { items: { type: array, items: { $ref: '#/components/schemas/PeriodoResponse' } }, pageInfo: { $ref: '../shared-api-components.yaml#/components/schemas/PageInfo' } }
    CuentaRequest:
      type: object
      required: [codigo, nombre, tipo, naturaleza]
      properties:
        codigo: { type: string, minLength: 1, maxLength: 20 }
        nombre: { type: string, minLength: 1, maxLength: 150 }
        tipo: { type: string, enum: [Asset, Liability, Equity, Income, Expense, Cost] }
        naturaleza: { type: string, enum: [Debit, Credit] }
        cuentaPadreId: { type: integer, format: int64, nullable: true }
    CuentaResponse:
      allOf:
        - { $ref: '#/components/schemas/CuentaRequest' }
        - { type: object, required: [id, activo, nivel, saldo], properties: { id: { type: integer, format: int64 }, activo: { type: boolean }, nivel: { type: integer, minimum: 1 }, saldo: { type: number, multipleOf: 0.01, description: Signed posted-ledger balance using account nature. } } }
    CuentaPage:
      type: object
      required: [items, pageInfo]
      properties: { items: { type: array, items: { $ref: '#/components/schemas/CuentaResponse' } }, pageInfo: { $ref: '../shared-api-components.yaml#/components/schemas/PageInfo' } }
    AsientoLineaRequest:
      type: object
      required: [cuentaId, debe, haber]
      properties:
        cuentaId: { type: integer, format: int64 }
        debe: { type: number, multipleOf: 0.01, minimum: 0, maximum: 9999999999.99 }
        haber: { type: number, multipleOf: 0.01, minimum: 0, maximum: 9999999999.99 }
        descripcion: { type: string, minLength: 1, maxLength: 250 }
    AsientoRequest:
      type: object
      required: [periodoContableId, fecha, descripcion, origen, lineas]
      properties:
        periodoContableId: { type: integer, format: int64 }
        fecha: { type: string, format: date }
        descripcion: { type: string, maxLength: 250 }
        origen: { type: string, enum: [Manual] }
        lineas: { type: array, minItems: 2, items: { $ref: '#/components/schemas/AsientoLineaRequest' } }
    AsientoResponse:
      type: object
      required: [id, periodo, fecha, descripcion, origen, estado, fechaPosteo, posteadoPorId, lineas, totalDebe, totalHaber]
      properties:
        id: { type: integer, format: int64 }
        periodo: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        fecha: { type: string, format: date }
        descripcion: { type: string }
        origen: { type: string, enum: [Manual, Comprobante, Planilla, Ajuste] }
        origenId: { type: integer, format: int64, nullable: true }
        asientoRevertidoId: { type: integer, format: int64, nullable: true }
        estado: { type: string, enum: [Draft, Posted, Cancelled] }
        fechaPosteo: { type: string, format: date-time, nullable: true }
        posteadoPorId: { type: integer, format: int64, nullable: true }
        lineas: { type: array, items: { $ref: '#/components/schemas/AsientoLineaRequest' } }
        totalDebe: { type: number, multipleOf: 0.01 }
        totalHaber: { type: number, multipleOf: 0.01 }
    AsientoPage:
      type: object
      required: [items, pageInfo]
      properties: { items: { type: array, items: { $ref: '#/components/schemas/AsientoResponse' } }, pageInfo: { $ref: '../shared-api-components.yaml#/components/schemas/PageInfo' } }
    ReversalRequest:
      type: object
      required: [periodoDestino, motivo]
      properties:
        periodoDestino: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }
        motivo: { type: string, minLength: 1, maxLength: 250 }
